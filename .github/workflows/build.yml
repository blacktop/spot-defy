# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: macos-15
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all --benches --tests --examples --all-features -- -D warnings

      - name: Test
        run: cargo test --all-features --locked

      - name: Verify release tag matches Cargo.toml
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          pkgid=$(cargo pkgid)
          version=${pkgid##*#}
          version=${version##*@}
          test "v${version}" = "${GITHUB_REF_NAME}"

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.6 --locked

      - name: Dependency policy
        run: cargo deny check

  build:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    needs: [check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            arch: arm64
            runner: macos-15
            artifact_name: spot-defy-macos-arm64
            artifact_path: target/release/spot-defy
          - os: macos
            arch: x86_64
            runner: macos-15-intel
            artifact_name: spot-defy-macos-x86_64
            artifact_path: target/release/spot-defy
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Build
        run: cargo build --release --locked

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: artifacts

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Package artifacts
        run: just ci-package-artifacts

      - name: Generate checksums
        run: just ci-generate-checksums

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
